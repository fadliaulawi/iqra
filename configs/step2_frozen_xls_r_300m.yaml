encoder_name: "facebook/wav2vec2-xls-r-300m"
vocab_path: "data/phoneme_vocab.json"

train_csv: "data/raw/train/metadata.csv"
val_csv: "data/raw/dev/metadata.csv"

batch_size: 8
num_workers: 4
max_audio_len_sec: 15.0

gradient_checkpointing: false

head_hidden: 1024
head_layers: 2
head_dropout: 0.1

learning_rate: 3.0e-4
weight_decay: 0.01
max_grad_norm: 5.0
max_epochs: 10
patience: 3
log_every_steps: 25

output_dir: "outputs/step2_frozen_xls_r_300m"
