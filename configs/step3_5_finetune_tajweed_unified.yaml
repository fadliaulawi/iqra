model_type: "ssl_ctc"
encoder_name: "facebook/wav2vec2-xls-r-1b"
vocab_path: "data/phoneme_vocab_tajweed_unified.json"

# Tajweed-only fine-tuning stage.
# IMPORTANT: generate these via scripts/prepare_tajweed_unified_with_audio.sh
train_csv: "data/raw/tajweed_unified/train_audio.csv"
val_csv: "data/raw/tajweed_unified/dev_audio.csv"

freeze_encoder: false
gradient_checkpointing: true
specaugment: true

batch_size: 16
gradient_accumulation_steps: 2
num_workers: 4
max_audio_len_sec: 15.0
fp16: true

head_hidden: 1024
head_layers: 2
head_dropout: 0.1

encoder_lr: 1.0e-5
head_lr: 1.0e-4
weight_decay: 0.01
warmup_ratio: 0.1
max_grad_norm: 5.0
max_epochs: 20
patience: 2
log_every_steps: 25

output_dir: "outputs/step3_5_tajweed_unified"
