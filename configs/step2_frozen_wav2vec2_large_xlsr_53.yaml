# Frozen encoder + CTC head — Wav2Vec2 Large XLS-R-53 (~317M).
# Strong multilingual SSL; same API as xls-r-300m.
encoder_name: "facebook/wav2vec2-large-xlsr-53"
vocab_path: "data/phoneme_vocab.json"

train_csv: "data/raw/train/metadata.csv"
val_csv: "data/raw/dev/metadata.csv"

batch_size: 4
num_workers: 4
max_audio_len_sec: 15.0

gradient_checkpointing: false

head_hidden: 1024
head_layers: 2
head_dropout: 0.1

learning_rate: 2.5e-4
weight_decay: 0.01
max_grad_norm: 5.0
max_epochs: 15
patience: 4
log_every_steps: 25

output_dir: "outputs/step2_frozen_wav2vec2_large_xlsr_53"
