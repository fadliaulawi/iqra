model_type: "ssl_ctc"
encoder_name: "facebook/wav2vec2-xls-r-1b"
vocab_path: "data/phoneme_vocab.json"

# Stage 3: final IqraEval adaptation.
train_csv: "data/raw/train/metadata.csv"
val_csv: "data/raw/dev/metadata.csv"

freeze_encoder: false
gradient_checkpointing: true
specaugment: true

batch_size: 16
gradient_accumulation_steps: 2
num_workers: 4
max_audio_len_sec: 15.0
fp16: true

head_hidden: 1024
head_layers: 2
head_dropout: 0.1

encoder_lr: 5.0e-6
head_lr: 5.0e-5
weight_decay: 0.01
warmup_ratio: 0.05
max_grad_norm: 5.0
max_epochs: 10
patience: 3
log_every_steps: 25

output_dir: "outputs/step4_stage3"
