model_type: "ssl_ctc"
encoder_name: "facebook/wav2vec2-xls-r-1b"
vocab_path: "data/phoneme_vocab.json"

# Stage 1: general Arabic speech (CV-Ar subset in Iqra train/dev)
train_csv: "data/raw/train/metadata.csv"
val_csv: "data/raw/dev/metadata.csv"

freeze_encoder: false
gradient_checkpointing: true
specaugment: true

batch_size: 16
gradient_accumulation_steps: 2
num_workers: 4
max_audio_len_sec: 15.0
fp16: true

head_hidden: 1024
head_layers: 2
head_dropout: 0.1

encoder_lr: 3.0e-5
head_lr: 3.0e-4
weight_decay: 0.01
warmup_ratio: 0.1
max_grad_norm: 5.0
max_epochs: 5
patience: 2
log_every_steps: 25

output_dir: "outputs/step4_stage1"
