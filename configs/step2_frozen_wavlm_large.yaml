# Frozen encoder + CTC head — WavLM Large (~317M).
# Wav2Vec2-family interface in Transformers (input_values + attention_mask).
encoder_name: "microsoft/wavlm-large"
vocab_path: "data/phoneme_vocab.json"

train_csv: "data/raw/train/metadata.csv"
val_csv: "data/raw/dev/metadata.csv"

batch_size: 4
num_workers: 4
max_audio_len_sec: 15.0

gradient_checkpointing: true

head_hidden: 1024
head_layers: 2
head_dropout: 0.1

learning_rate: 2.5e-4
weight_decay: 0.01
max_grad_norm: 5.0
max_epochs: 15
patience: 4
log_every_steps: 25

output_dir: "outputs/step2_frozen_wavlm_large"
