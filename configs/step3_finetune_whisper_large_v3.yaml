model_type: "whisper_encoder_ctc"
encoder_name: "openai/whisper-large-v3"
vocab_path: "data/phoneme_vocab.json"

train_csv: "data/raw/train/metadata.csv"
val_csv: "data/raw/dev/metadata.csv"

freeze_encoder: false
gradient_checkpointing: true
specaugment: true

batch_size: 2
gradient_accumulation_steps: 4
num_workers: 4
max_audio_len_sec: 15.0
fp16: true

head_hidden: 1024
head_layers: 2
head_dropout: 0.1

encoder_lr: 1.0e-5
head_lr: 3.0e-4
weight_decay: 0.01
warmup_ratio: 0.1
max_grad_norm: 5.0
max_epochs: 12
patience: 3
log_every_steps: 25

output_dir: "outputs/step3_finetune_whisper_large_v3"
