# Step 0 — paper-style baseline reproduction (frozen SSL + BiLSTM CTC).
# Target baseline in paper Table 2: Baseline 1 (mHuBERT) F1 ~0.4414.
# NOTE:
# - This config assumes a Transformers-compatible mHuBERT checkpoint.
# - If your environment has a different mHuBERT id, change `encoder_name`.
model_type: "ssl_ctc"
encoder_name: "utter-project/mHuBERT-147"
vocab_path: "data/phoneme_vocab.json"

train_csv: "data/raw/train/metadata.csv"
val_csv: "data/raw/dev/metadata.csv"

# Baseline protocol uses frozen encoder.
freeze_encoder: true
gradient_checkpointing: false
specaugment: false

batch_size: 16
gradient_accumulation_steps: 2
num_workers: 4
max_audio_len_sec: 15.0
fp16: true

head_hidden: 1024
head_layers: 2
head_dropout: 0.1

learning_rate: 3.0e-4
weight_decay: 0.01
warmup_ratio: 0.1
max_grad_norm: 5.0
max_epochs: 20
patience: 5
log_every_steps: 50

output_dir: "outputs/step0_baseline_mhubert"
